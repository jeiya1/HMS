<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page">
    <div class="login-container">
        <form class="login-form" action="#" method="post">
            <h1 class="login-title">Log In</h1>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <div class="password-group">
                    <input type="password" id="password" name="password" required>
                    <div class="password-toggle">
                        <img src="assets/icons/eye-off.svg">
                        <span>Hide</span>
                    </div>
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="remember" name="remember">
                    <label for="remember">Remember me</label>
                </div>
            </div>
            <div class="form-group">
                <p class="terms">
                    By continuing, you agree to the <a href="./terms.html">Terms of use</a> and <a href="./privacy.html">Privacy Policy</a>.
                </p>
                <button type="submit" class="login-button">Log in</button>
            </div>
        </form>
        <div class="links">
            <a href="#">Forgot Password?</a>
            <p class="signup-text">Don't have an account? <a href="signup.html">Sign up</a></p>
        </div>
    </div>
</body>
</html>
