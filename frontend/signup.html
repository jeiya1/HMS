<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f5f5f5;
        }
        .signup-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 72px;
            max-width: 800px;
            width: 100%;
            padding: 20px;
        }
        .signup-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }
        .signup-title {
            font-size: 32px;
            font-weight: 500;
            color: #333333;
            text-align: center;
        }
        .login-link {
            font-size: 16px;
            color: #333333;
        }
        .login-link a {
            color: #111111;
            text-decoration: underline;
        }
        .signup-form {
            display: flex;
            flex-direction: column;
            gap: 40px;
            width: 100%;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
            width: 100%;
        }
        .form-group label {
            font-size: 16px;
            color: #666666;
            font-weight: 400;
        }
        .form-group input {
            width: 100%;
            height: 56px;
            border-radius: 12px;
            border: 1px solid rgba(102, 102, 102, 0.35);
            padding: 0 24px;
            font-size: 16px;
            font-family: 'Poppins', sans-serif;
            box-sizing: border-box;
        }
        .form-group input::placeholder {
            color: rgba(102, 102, 102, 0.60);
        }
        .password-group {
            position: relative;
        }
        .password-toggle {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            align-items: center;
            gap: 8px;
            color: rgba(102, 102, 102, 0.8);
            font-size: 18px;
            cursor: pointer;
        }
        .password-hint {
            font-size: 14px;
            color: #666666;
            margin-top: 4px;
        }
        .terms {
            font-size: 16px;
            color: #333333;
            line-height: 1.5;
        }
        .terms a {
            color: #111111;
            text-decoration: underline;
        }
        .signup-button {
            width: 100%;
            height: 64px;
            background: #111111;
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 22px;
            font-weight: 500;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            transition: opacity 0.3s;
        }
        .signup-button:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="signup-container">
        <div class="signup-header">
            <h1 class="signup-title">Create an account</h1>
            <p class="login-link">Already have an account? <a href="login.html">Log in</a></p>
        </div>
        <form class="signup-form" action="#" method="post">
            <div class="form-group">
                <label for="name">What should we call you?</label>
                <input type="text" id="name" name="name" placeholder="Enter your name" required>
            </div>
            <div class="form-group">
                <label for="email">What's your email?</label>
                <input type="email" id="email" name="email" placeholder="Enter your email address" required>
            </div>
            <div class="form-group">
                <label for="password">Create a password</label>
                <div class="password-group">
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                    <div class="password-toggle">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M19.8825 4.88134L19.1465 4.14539C18.9385 3.9374 18.5545 3.96941 18.3145 4.25736L15.7543 6.80132C14.6023 6.30538 13.3384 6.06538 12.0103 6.06538C8.05822 6.08132 4.63444 8.38529 2.98633 11.6975C2.8903 11.9055 2.8903 12.1614 2.98633 12.3374C3.75426 13.9054 4.90633 15.2015 6.34633 16.1774L4.25034 18.3054C4.01034 18.5454 3.97833 18.9293 4.13838 19.1374L4.87432 19.8733C5.08231 20.0813 5.4663 20.0493 5.7063 19.7613L19.7542 5.71345C20.0582 5.47358 20.0902 5.08962 19.8822 4.88161L19.8825 4.88134ZM12.8583 9.71322C12.5863 9.6492 12.2984 9.56925 12.0264 9.56925C10.6663 9.56925 9.57842 10.6573 9.57842 12.0172C9.57842 12.2892 9.64244 12.5771 9.72239 12.8492L8.65028 13.9052C8.33032 13.3452 8.15433 12.7211 8.15433 12.0172C8.15433 9.88924 9.86636 8.17722 11.9943 8.17722C12.6984 8.17722 13.3224 8.3532 13.8823 8.67316L12.8583 9.71322Z" fill="#666666" fill-opacity="0.8"/>
                            <path d="M21.0345 11.6974C20.4745 10.5774 19.7384 9.56945 18.8265 8.75342L15.8505 11.6974V12.0174C15.8505 14.1454 14.1385 15.8574 12.0105 15.8574H11.6905L9.80255 17.7454C10.5066 17.8893 11.2426 17.9854 11.9626 17.9854C15.9147 17.9854 19.3385 15.6814 20.9866 12.3532C21.1306 12.1292 21.1306 11.9053 21.0345 11.6973L21.0345 11.6974Z" fill="#666666" fill-opacity="0.8"/>
                        </svg>
                        <span>Hide</span>
                    </div>
                </div>
                <p class="password-hint">Use 8 or more characters with a mix of letters, numbers & symbols</p>
            </div>
            <div class="form-group">
                <p class="terms">
                    By creating an account, you agree to the <a href="#">Terms of use</a> and <a href="#">Privacy Policy</a>.
                </p>
                <button type="submit" class="signup-button">Create an account</button>
            </div>
        </form>
    </div>
</body>
</html>
