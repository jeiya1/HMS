<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <form id="signup-form" action="/signup-submit" method="POST">
        <label for="fname">First Name: </label>
        <input type="text" name="fname" required>
        <br>
        <label for="lname">Last Name: </label>
        <input type="text" name="lname" required>
        <br>
        <label for="phone">Phone Contact: </label>
        <input type="tel" pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}" name="phone" placeholder="000-000-0000" required>
        <br>
        <label for="email">Email: </label>
        <input type="email" name="email" required>
        <br>
        <div class="form-group">
            <label for="password">Create Password</label>
            <input type="password" id="password" name="password" required>

            <div id="password-error" class="error-message"></div>
        </div>
        <label for="passwordr">Retype Password: </label>
        <input type="password" id="passwordr" name="passwordr" required>
        <br>

        <input type="submit" value="signup">
    </form>
    <script src="/js/signup.js"></script>
</body>
</html>
